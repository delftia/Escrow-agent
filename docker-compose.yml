
services:
  # ─── Main app ────────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ton-mcp:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql://trustdeal:trustdeal@postgres:5432/trustdeal
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3000:3000'

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trustdeal
      POSTGRES_PASSWORD: trustdeal
      POSTGRES_DB: trustdeal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trustdeal']
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
    - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
